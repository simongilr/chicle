name: ${COMPOSE_PROJECT_NAME:-chicle-engine}

services:
  db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: ${DB_NAME:-chicle_engine}
      MYSQL_USER: ${DB_USER:-chicle}
      MYSQL_PASSWORD: ${DB_PASSWORD:-chicle_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - chicle_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: ${API_PORT:-3000}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-chicle_engine}
      DB_USER: ${DB_USER:-chicle}
      DB_PASSWORD: ${DB_PASSWORD:-chicle_secret}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      CHICLE_ENV: ${CHICLE_ENV:-local}
      CHICLE_VAULT_PATH: ${CHICLE_VAULT_PATH:-/app/storage/vault}
      CHICLE_SECRET_MASTER_KEY: ${CHICLE_SECRET_MASTER_KEY:-}
      CHICLE_CORS_ORIGINS: ${CHICLE_CORS_ORIGINS:-}
      CHICLE_SWAGGER_ENABLED: ${CHICLE_SWAGGER_ENABLED:-}
      CHICLE_SWAGGER_USER: ${CHICLE_SWAGGER_USER:-}
      CHICLE_SWAGGER_PASSWORD: ${CHICLE_SWAGGER_PASSWORD:-}
      CHICLE_ALLOW_SYSTEM_RESET: ${CHICLE_ALLOW_SYSTEM_RESET:-false}
      CHICLE_RESET_KEY: ${CHICLE_RESET_KEY:-}
      CHICLE_SCHEMA_MIGRATIONS_WRITE_FILES: ${CHICLE_SCHEMA_MIGRATIONS_WRITE_FILES:-true}
      CHICLE_SCHEMA_MIGRATIONS_DIR: ${CHICLE_SCHEMA_MIGRATIONS_DIR:-src/database/migrations}
      CHICLE_SCHEMA_ALLOW_DROP_TABLE: ${CHICLE_SCHEMA_ALLOW_DROP_TABLE:-true}
      FILES_ROOT: /app/storage/files
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_BASE_URL: ${AI_BASE_URL:-http://ollama:11434/v1}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-qwen2.5-coder:7b}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-nomic-embed-text:v1.5}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-180000}
      AI_FAST_TIMEOUT_MS: ${AI_FAST_TIMEOUT_MS:-18000}
      AI_REASONING_TIMEOUT_MS: ${AI_REASONING_TIMEOUT_MS:-45000}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-420}
      AI_FAST_MAX_TOKENS: ${AI_FAST_MAX_TOKENS:-140}
      AI_CONTEXT_WINDOW: ${AI_CONTEXT_WINDOW:-4096}
      AI_KEEP_ALIVE: ${AI_KEEP_ALIVE:-10m}
      AI_RAG_ENABLED: ${AI_RAG_ENABLED:-true}
      AI_RAG_MODE: ${AI_RAG_MODE:-keyword}
      AI_MAX_CONTEXT_CHUNKS: ${AI_MAX_CONTEXT_CHUNKS:-12}
      AI_ALLOW_PUBLISH: ${AI_ALLOW_PUBLISH:-false}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    volumes:
      - chicle_files:/app/storage/files
      - chicle_vault:/app/storage/vault
      - ../../apps/api/src/database/migrations:/app/src/database/migrations
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ai-local
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - chicle_ollama:/root/.ollama

volumes:
  chicle_db:
  chicle_files:
  chicle_vault:
  chicle_ollama:
